<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>D&D Runner - Create Character</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a href="../index.html" class="back-link">← Return to Menu</a>

    <header class="player-header">
      <img src="../images/dnd-logo.png" alt="D&D Logo" class="mini-logo" />
    </header>

    <main class="content-card">
      <!-- STEP 1 -->
      <section id="step1" class="step">
        <h1>Step 1: Basic Info</h1>
        <div class="input-group">
          <input type="text" id="name" placeholder="Character Name" required />

          <select id="race" required>
            <option value="" disabled selected>Select Race</option>
            <option>Dwarf</option>
            <option>Elf</option>
            <option>Halfling</option>
            <option>Human</option>
            <option>Dragonborn</option>
            <option>Gnome</option>
            <option>Half-Elf</option>
            <option>Half-Orc</option>
            <option>Tiefling</option>
          </select>

          <select id="charClass" required>
            <option value="" disabled selected>Select Class</option>
            <option>Barbarian</option>
            <option>Bard</option>
            <option>Cleric</option>
            <option>Druid</option>
            <option>Fighter</option>
            <option>Monk</option>
            <option>Paladin</option>
            <option>Ranger</option>
            <option>Rogue</option>
            <option>Sorcerer</option>
            <option>Warlock</option>
            <option>Wizard</option>
          </select>

          <div class="level-box">
            <label>Starting Level</label>
            <input type="number" id="level" value="1" min="1" step="1" />
          </div>
        </div>

        <button type="button" id="toStep2" class="role-btn">
          Continue Journey
        </button>
      </section>

      <!-- STEP 2 -->
      <section id="step2" class="step hidden wide-step">
        <h1>Step 2: Roll Your Attributes</h1>

        <div class="step2-layout">
          <!-- STAT CARDS -->
          <div class="stats-grid">
            <div class="stat-card" data-stat="str">
              <h3>STR</h3>
              <div class="stat-value">--</div>
              <button type="button" class="reroll-btn">Reroll</button>
            </div>

            <div class="stat-card" data-stat="dex">
              <h3>DEX</h3>
              <div class="stat-value">--</div>
              <button type="button" class="reroll-btn">Reroll</button>
            </div>

            <div class="stat-card" data-stat="con">
              <h3>CON</h3>
              <div class="stat-value">--</div>
              <button type="button" class="reroll-btn">Reroll</button>
            </div>

            <div class="stat-card" data-stat="int">
              <h3>INT</h3>
              <div class="stat-value">--</div>
              <button type="button" class="reroll-btn">Reroll</button>
            </div>

            <div class="stat-card" data-stat="wis">
              <h3>WIS</h3>
              <div class="stat-value">--</div>
              <button type="button" class="reroll-btn">Reroll</button>
            </div>

            <div class="stat-card" data-stat="cha">
              <h3>CHA</h3>
              <div class="stat-value">--</div>
              <button type="button" class="reroll-btn">Reroll</button>
            </div>

            <button type="button" id="rollAll" class="role-btn roll-all">
              🎲 Roll All Stats
            </button>
          </div>

          <!-- DICE PANEL -->
          <!-- <div class="dice-panel">
            <div id="dice3d" aria-label="Dice">
              <div class="face front"></div>
              <div class="face back"></div>
              <div class="face right"></div>
              <div class="face left"></div>
              <div class="face top"></div>
              <div class="face bottom"></div>
            </div>
          </div> -->

          <div id="dice3d" class="dice-wrap">
            <div id="d20" class="d20" data-face="1" aria-label="d20">
              <figure class="d20-face" data-num="1"></figure>
              <figure class="d20-face" data-num="2"></figure>
              <figure class="d20-face" data-num="3"></figure>
              <figure class="d20-face" data-num="4"></figure>
              <figure class="d20-face" data-num="5"></figure>
              <figure class="d20-face" data-num="6"></figure>
              <figure class="d20-face" data-num="7"></figure>
              <figure class="d20-face" data-num="8"></figure>
              <figure class="d20-face" data-num="9"></figure>
              <figure class="d20-face" data-num="10"></figure>
              <figure class="d20-face" data-num="11"></figure>
              <figure class="d20-face" data-num="12"></figure>
              <figure class="d20-face" data-num="13"></figure>
              <figure class="d20-face" data-num="14"></figure>
              <figure class="d20-face" data-num="15"></figure>
              <figure class="d20-face" data-num="16"></figure>
              <figure class="d20-face" data-num="17"></figure>
              <figure class="d20-face" data-num="18"></figure>
              <figure class="d20-face" data-num="19"></figure>
              <figure class="d20-face" data-num="20"></figure>
            </div>
          </div>
        </div>

        <div class="button-group">
          <button type="button" id="backTo1" class="role-btn secondary">
            Back
          </button>
          <button type="button" id="toStep3" class="role-btn">Next</button>
        </div>
      </section>

      <!-- STEP 3 -->
      <section id="step3" class="step hidden">
        <h1>Step 3: Vital Stats</h1>

        <div class="input-group">
          <input
            type="number"
            id="maxHp"
            min="1"
            step="1"
            placeholder="Max HP"
          />
          <input
            type="number"
            id="mp"
            min="0"
            step="1"
            placeholder="MP (optional)"
          />
        </div>

        <div class="button-group">
          <button type="button" id="backTo2" class="role-btn secondary">
            Back
          </button>
          <button type="button" id="toStep4" class="role-btn">Next</button>
        </div>
      </section>

      <!-- STEP 4 -->
      <section id="step4" class="step hidden">
        <h1>Step 4: Character Backstory (Optional)</h1>

        <div class="input-group">
          <textarea
            id="backstory"
            rows="8"
            placeholder="Write your character’s backstory... (optional)"
          ></textarea>
        </div>

        <div class="button-group">
          <button type="button" id="backTo3" class="role-btn secondary">
            Back
          </button>
          <button type="button" id="finish" class="role-btn">
            Finish Character
          </button>
        </div>
      </section>

      <!-- FINAL -->
      <section id="final" class="step hidden">
        <h1>Character Created</h1>

        <div class="final-sheet">
          <div class="final-header">
            <div id="characterMeta"></div>
          </div>

          <div id="characterStatsGrid" class="final-stats-grid"></div>
          <div id="backstoryBlock" class="backstory-block hidden"></div>
        </div>

        <button
          type="button"
          class="role-btn secondary"
          onclick="window.location.href = '../index.html'"
        >
          Return to Menu
        </button>
      </section>
    </main>

    <script src="player-logic.js"></script>
  </body>
</html>
