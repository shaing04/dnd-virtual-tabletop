<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dungeons and Dragons Virtual Tabletop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <img src="images/dnd-red-dragon.png" class="dragon-bg top-right" alt="" />
    <img
      src="images/dnd-white-dragon.png"
      class="dragon-bg bottom-left"
      alt=""
    />

    <main class="home-page">
      <h1 class="logo-container">
        <img
          src="images/dnd-logo.png"
          alt="Dungeons and Dragons"
          class="main-logo"
        />
      </h1>
      <h2>Welcome to the Table</h2>
      <p>Choose your role to begin your adventure</p>

      <div class="role-selection">
        <button id="btn-dm" class="role-btn">Dungeon Master</button>
        <button id="btn-player" class="role-btn">Player</button>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
